name: TelltaleToolKit CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    paths:
      - "**.cs"
      - "**.csproj"

env:
  DOTNET_VERSION: "9.0.x"

jobs:
  build-test:
    name: build-and-test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore main project
        run: dotnet restore src/TelltaleToolKit/

      - name: Restore all solutions/projects
        run: |
          dotnet restore samples/VersionDatabaseCreator/
          dotnet restore samples/Example/

      - name: Build
        run: dotnet build --configuration Release --no-restore

      - name: Test
        run: dotnet test --no-restore --verbosity normal
